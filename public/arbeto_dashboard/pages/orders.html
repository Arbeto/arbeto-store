<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../image\favicoon.png" />
    <link rel="stylesheet" href="../css\style.css">
    <link rel="stylesheet" href="../css\orders.css">
    <title>Arbeto Dashboard - الطلبات</title>
        <!-- مكتية الشعارات bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
</head>
<body>
    <header>
        <div class="logo">
            <img src="../image\logo-nunbg.png" alt="Logo">
        </div>
    </header>
    <nav class="sidebar">
       <div class="side-name">
        <img class="user-image" src="../image\dashboard\user.png" alt="">
        <span>مدير المتجر</span>
    </div>

    <div class="dvaider"></div>
        <ul class="page-sidebar">
        <label class="title-category-sidebar">لوحة التحكم </label>
        <li ><a href="/">لوحة التحكم <span style="font-size: 20px;" class="bi bi-speedometer"></span></a></li>
        <label class="title-category-sidebar">المنتجات والطلبات</label>
        <li ><a href="/pages/products.html">المنتجات <span style="font-size: 20px;" class="bi bi-box-seam-fill"></span></a></li>
        <li><a href="/pages/categories-offers.html">الأقسام والعروض <span style="font-size: 20px;" class="bi bi-person-vcard-fill"></span></a></li>
        <li class="active"><a href="/pages/orders.html">الطلبات <span style="font-size: 20px;" class="bi bi-clipboard2-minus-fill"></span></a></li>
        <li><a href="/pages/customers.html">العملاء <span style="font-size: 20px;" class="bi bi-people-fill"></span></a></li>
        <label class="title-category-sidebar">شركات الشحن</label>
        <li><a href="/pages/arbeto-express.html">Arbeto Express <span style="font-size: 20px;" class="bi bi-truck"></span></a></li>
        <li><a href="/pages/egypt-post.html">البريد المصري <span style="font-size: 20px;" class="bi bi-box-seam-fill"></span></a></li>
        <label class="title-category-sidebar">الإحصائيات</label>
        <li><a href="/pages/analysis.html">التقارير المالية<span style="font-size: 20px;" class="bi bi-bar-chart-line-fill"></span></a></li>
    </ul>
    </nav>

  <div class="dashboard-container">
        <div class="page-header">
            <h1><i class="bi bi-clipboard-check"></i> إدارة الطلبات</h1>
            <p>متابعة وإدارة طلبات العملاء</p>
        </div>

        <!-- New Orders Section -->
        <section class="orders-section">
            <h2 class="section-title">الطلبات الجديدة</h2>
            <div id="newOrdersContainer" class="orders-grid">
                <!-- New orders will be loaded here -->
            </div>
        </section>

        <!-- Shipped Orders Section -->
        <section class="orders-section">
            <h2 class="section-title">الطلبات المشحونة</h2>
            <div id="shippedOrdersContainer" class="shipped-orders-list">
                <!-- Shipped orders will be loaded here -->
            </div>
        </section>
    </div>

    <!-- Shipping Company Modal -->
    <div class="modal-overlay" id="shippingModal">
        <div class="modal-container small-modal">
            <div class="modal-header">
                <h3>اختر شركة الشحن</h3>
                <button class="btn-close-modal" onclick="closeShippingModal()">
                    <span class="bi bi-x-lg"></span>
                </button>
            </div>
            <div class="modal-body">
                <div class="shipping-options">
                    <label class="shipping-option">
                        <input type="radio" name="shippingCompany" value="arbeto" checked>
                        <span class="option-label">
                            <i class="bi bi-truck"></i>
                            Arbeto Express
                        </span>
                    </label>
                    <label class="shipping-option">
                        <input type="radio" name="shippingCompany" value="post">
                        <span class="option-label">
                            <i class="bi bi-mailbox"></i>
                            البريد المصري
                        </span>
                    </label>
                </div>
                <button class="btn-submit" id="submitShippingBtn" onclick="submitShipping()">
                    <span class="btn-text">إرسال</span>
                    <span class="btn-loader" style="display: none;">
                        <i class="bi bi-arrow-repeat rotating"></i>
                    </span>
                </button>
            </div>
        </div>
    </div>

    <!-- Rejection Modal -->
    <div class="modal-overlay" id="rejectionModal">
        <div class="modal-container small-modal">
            <div class="modal-header">
                <h3>اكتب سبب الرفض</h3>
                <button class="btn-close-modal" onclick="closeRejectionModal()">
                    <span class="bi bi-x-lg"></span>
                </button>
            </div>
            <div class="modal-body">
                <textarea id="rejectionReason" class="rejection-textarea" placeholder="أدخل سبب رفض الطلب..."></textarea>
                <button class="btn-submit btn-danger" id="submitRejectionBtn" onclick="submitRejection()">
                    <span class="btn-text">إرسال</span>
                    <span class="btn-loader" style="display: none;">
                        <i class="bi bi-arrow-repeat rotating"></i>
                    </span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-notification" id="toastNotification">
        <span class="bi bi-check-circle-fill toast-icon"></span>
        <span class="toast-message" id="toastMessage">تمت العملية بنجاح</span>
    </div>

    <script src="../js/orders.js"></script>

    <!-- <footer>
        <p>جميع الحقوق محفوظة &copy; 2024 Arbeto Dashboard</p>
    </footer> -->

    <!-- Mobile Menu Includes -->
    <button class="menu-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
    <div class="sidebar-overlay"></div>
    <script src="../js/mobile-menu.js"></script>
</body>
</html>
